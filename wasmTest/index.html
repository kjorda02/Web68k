<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="button-container">
        <button id="loadButton">Load Variables</button>
    </div>
    
    <div class="content-container">
        <div class="left-panel">
            <textarea id="textBox1" placeholder="Enter text for variable 1"></textarea>
            <textarea id="textBox2" placeholder="Enter text for variable 2"></textarea>
        </div>
        
        <div class="right-panel">
            <select id="selectBox" size="10">
                <option value="option1">Option 1</option>
                <option value="option2">Option 2</option>
                <option value="option3">Option 3</option>
                <option value="option4">Option 4</option>
                <option value="option5">Option 5</option>
                <option value="option6">Option 6</option>
                <option value="option7">Option 7</option>
                <option value="option8">Option 8</option>
                <option value="option9">Option 9</option>
                <option value="option10">Option 10</option>
            </select>
        </div>
    </div>
    
    <div id="result"></div>
    
    <script src="cpu.js"></script>
</body>
</html>
